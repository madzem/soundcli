name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build packages & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage artifacts
        id: stage
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          TARBALL="soundcli-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -czf "dist/${TARBALL}" -C target/release soundcli \
              -C "${GITHUB_WORKSPACE}" README.md LICENSE

          cargo deb --no-build --output dist/

          cargo generate-rpm
          cp target/generate-rpm/*.rpm dist/

          ( cd dist && sha256sum * > SHA256SUMS )
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
